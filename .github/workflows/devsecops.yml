name: Pipeline DevSecOps - Skaolink

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  audit-and-build:
    name: Audit, Build & DAST
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration de Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installation des dépendances de test
        run: |
          python -m pip install --upgrade pip
          pip install bandit flake8 black pip-audit

      - name:  01 · Lint & Style (Flake8 & Black)
        run: |
          black --check backend/ || echo "Formatage Black à vérifier"
          flake8 backend/ --max-line-length=120 || echo "Avertissements Flake8"

      - name:  02a · Scan des Secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name:  02b · SAST - Analyse statique (Bandit)
        run: |
          bandit -r backend/ -ll -ii

      - name:  03 · Audit des dépendances (pip-audit)
        run: |
          pip-audit -r backend/requirements.txt || echo "Avertissement : vulnérabilités trouvées dans les paquets"

      - name:  04 · Build de l'image Docker
        run: |
          docker-compose build

      - name:  05 · Déploiement Staging (Environnement de test local)
        run: |
          docker-compose up -d
          echo "Attente de 15 secondes pour le démarrage des conteneurs..."
          sleep 15 

      - name:  06 · DAST - Scan Dynamique OWASP ZAP
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost'
          fail_action: false         
          allow_issue_writing: false

      - name:  Nettoyage du Staging
        run: docker-compose down


  deploy-prod:
    name: 07 · Déploiement en Production
    needs: audit-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name:  Déploiement via SSH sur la VM Ubuntu
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/Skaolink
            git pull origin main
            
            # Injection sécurisée des variables d'environnement depuis GitHub Secrets
            export FLASK_SECRET_KEY=${{ secrets.SECRET_KEY }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            export REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            export JITSI_SECRET=${{ secrets.JITSI_SECRET }}
            export MYSQL_USER=${{ secrets.MYSQL_USER }}
            
            # Redémarrage de l'infrastructure de production
            docker-compose down
            docker-compose up -d --build
