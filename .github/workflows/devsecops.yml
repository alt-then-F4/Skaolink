name: 🛡️ Pipeline DevSecOps - Skaolink

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-audit:
    name: Audit de Sécurité et Qualité du Code
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Configuration de Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Installation des dépendances de test
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: 🕵️‍♂️ Scan des Secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐞 SAST - Analyse statique avec Bandit
        run: |
          bandit -r backend/ -ll -ii
