{% extends "base.html" %}

{% block title %}Paramètres - Skaolink{% endblock %}

{% block content %}
<div style="padding: 30px; max-width: 600px; margin: 40px auto; background: var(--bg-card, #fff); border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
    <h2 style="margin-top: 0; color: var(--ink);">⚙️ Paramètres</h2>
    <hr style="border: none; border-top: 1px solid var(--border); margin: 20px 0;">

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <strong style="font-size: 16px; color: var(--ink);">Mode Sombre</strong>
            <p style="color: var(--muted); font-size: 13px; margin: 5px 0 0;">Basculer l'interface en mode sombre pour soulager vos yeux.</p>
        </div>
        
        <label class="switch">
            <input type="checkbox" id="dark-mode-toggle" onchange="toggleDarkMode()">
            <span class="slider round"></span>
        </label>
    </div>
</div>

<style>
    .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px;}
    .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;}
    input:checked + .slider { background-color: #1e8e3e; }
    input:checked + .slider:before { transform: translateX(24px); }
</style>

<script>
    // Vérifie le thème au chargement
    document.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('theme') === 'dark') {
            document.getElementById('dark-mode-toggle').checked = true;
        }
    });

    // Bascule le thème sur la balise <html>
    function toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
</script>
{% endblock %}
