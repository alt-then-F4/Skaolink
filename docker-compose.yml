version: '3.8'
services:
  nginx:
    image: nginx:1.24
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/static:/app/static:ro
    depends_on:
      flask_app:
        condition: service_healthy
    networks:
      - skaolink_net

  flask_app:
    build: ./backend
    expose:
      - "5000"
    environment:
      - SECRET_KEY=${FLASK_SECRET_KEY}
      - DB_PASSWORD=${MYSQL_PASSWORD}
    depends_on:
      mysql_db:
        condition: service_healthy
      redis_broker:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/login"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - skaolink_net
    volumes:
      - ./backend/templates:/app/templates
      - ./backend/static:/app/static

  mysql_db:
    image: mysql:8.0
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: skaolink
      MYSQL_USER: skaolink_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - skaolink_net

  redis_broker:
    image: redis:7
    expose:
      - "6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - skaolink_net

networks:
  skaolink_net:
    driver: bridge

volumes:
  mysql_data:
  static_files:
