services:
  flask:
    build: .
    container_name: flask_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "0.0.0.0:5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  mysql_data:

networks:
  internal:
    driver: bridge
