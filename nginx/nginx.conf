events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Sécurité : Masque la version de Nginx
    server_tokens off;

    # Limiteur de requêtes (Anti-DDoS basique)
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    # Redirection stricte du HTTP (80) vers HTTPS (443)
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Serveur sécurisé HTTPS
    server {
        listen 443 ssl;
        server_name _;

        # Chemins vers les clés générées à l'étape 1
        ssl_certificate /etc/nginx/certs/skaolink.crt;
        ssl_certificate_key /etc/nginx/certs/skaolink.key;
        
        # Protocoles sécurisés modernes uniquement
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # En-tête HSTS (Strict-Transport-Security)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            limit_req zone=mylimit burst=20 nodelay;
            proxy_pass http://flask_app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            # Configuration pour les WebSockets (Socket.IO / Messagerie)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
